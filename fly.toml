# TRACE — Treatment Record Acquisition and Chronology Engine
# Fly.io deployment (platform standard, matches SETTLE region 'iad').
app = 'truevow-trace'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

[env]
  ENVIRONMENT = 'production'
  AUTH_MODE = 'clerk'
