# Alembic config for TRACE. Runtime DB URL is resolved in env.py from
# TRACE_DATABASE_URL / DATABASE_URL — never hardcode credentials here.
[alembic]
script_location = infra/database/migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is intentionally left blank; env.py injects it from the environment.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
